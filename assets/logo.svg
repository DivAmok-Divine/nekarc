<svg width="480" height="150" viewBox="0 0 480 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nekarc — Network Architect">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon tile: a network topology shaped like an architectural arch -->
  <rect x="14" y="25" width="100" height="100" rx="26" fill="#0b1120" stroke="url(#grad)" stroke-width="2"/>
  <g stroke="url(#grad)" stroke-width="2" stroke-opacity="0.55" filter="url(#glow)">
    <line x1="64" y1="104" x2="44" y2="78"/>
    <line x1="64" y1="104" x2="84" y2="78"/>
    <line x1="44" y1="78" x2="32"  y2="54"/>
    <line x1="44" y1="78" x2="49"  y2="46"/>
    <line x1="44" y1="78" x2="64"  y2="42"/>
    <line x1="84" y1="78" x2="64"  y2="42"/>
    <line x1="84" y1="78" x2="79"  y2="46"/>
    <line x1="84" y1="78" x2="96"  y2="54"/>
  </g>
  <g fill="url(#grad)" filter="url(#glow)">
    <circle cx="64" cy="104" r="7"/>
    <circle cx="44" cy="78"  r="5.5"/>
    <circle cx="84" cy="78"  r="5.5"/>
    <circle cx="32" cy="54"  r="4.5"/>
    <circle cx="49" cy="46"  r="4.5"/>
    <circle cx="64" cy="42"  r="4.5"/>
    <circle cx="79" cy="46"  r="4.5"/>
    <circle cx="96" cy="54"  r="4.5"/>
  </g>

  <!-- wordmark -->
  <text x="138" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="46" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#e2e8f0">nek</tspan><tspan fill="url(#grad)">arc</tspan>
  </text>
  <text x="140" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="12.5" font-weight="600" letter-spacing="4.5" fill="#64748b">
    NETWORK ARCHITECT
  </text>
</svg>
